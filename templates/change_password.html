{% extends "base.html" %}
{% block title %}비밀번호 변경 - 임대관리{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h4 class="mb-3"><i class="bi bi-key"></i> 비밀번호 변경</h4>
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">현재 비밀번호</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">새 비밀번호 (4자 이상)</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 변경
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">취소</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
