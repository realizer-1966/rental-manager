{% extends "base.html" %}
{% block title %}계량기 기록 - 임대관리{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h4 class="mb-3">
            <i class="bi bi-speedometer"></i> 계량기 기록
            <small class="text-muted">{{ contract.building_name }} — {{ contract.unit_number }}</small>
        </h4>
        <div class="card">
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">종류 *</label>
                            <select name="type" class="form-select" required>
                                <option value="electric">전기</option>
                                <option value="gas">도시가스</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">구분 *</label>
                            <select name="reading_type" class="form-select" required>
                                <option value="move_in">입주 시</option>
                                <option value="move_out">퇴거 시</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">날짜 *</label>
                            <input type="date" name="reading_date" class="form-control" value="{{ today_str }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">계량기 수치</label>
                            <input type="number" step="0.01" name="meter_value" class="form-control"
                                   placeholder="kWh 또는 m³">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">계량기 사진</label>
                            <input type="file" name="photo" class="form-control" accept="image/*" capture="environment">
                            <small class="text-muted">jpg, png, gif, webp / 카메라 직접 촬영 가능</small>
                        </div>
                        <div class="col-12">
                            <label class="form-label">메모</label>
                            <textarea name="memo" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 저장
                            </button>
                            <a href="{{ url_for('contract_view', cid=contract.id) }}" class="btn btn-outline-secondary">취소</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
