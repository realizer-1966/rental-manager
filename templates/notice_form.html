{% extends "base.html" %}
{% block title %}{{ '공지 수정' if notice else '공지 작성' }} - 임대관리{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h4 class="mb-3">
            <i class="bi bi-megaphone-fill"></i>
            {{ '공지 수정' if notice else '공지 작성' }}
        </h4>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">제목 <span class="text-danger">*</span></label>
                <input type="text" name="title" class="form-control" required
                       value="{{ notice.title if notice else '' }}"
                       placeholder="공지 제목">
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">카테고리</label>
                    <select name="category" class="form-select">
                        {% for key, (label, color) in categories.items() %}
                        <option value="{{ key }}"
                            {% if notice and notice.category == key %}selected{% endif %}
                            {% if not notice and key == 'general' %}selected{% endif %}>
                            {{ label }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">대상 건물</label>
                    <select name="target_building_id" class="form-select">
                        <option value="">전체 건물</option>
                        {% for b in buildings %}
                        <option value="{{ b.id }}"
                            {% if notice and notice.target_building_id == b.id %}selected{% endif %}>
                            {{ b.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        <input type="checkbox" name="is_pinned" value="1" class="form-check-input"
                               id="is_pinned" {% if notice and notice.is_pinned %}checked{% endif %}>
                        <label class="form-check-label" for="is_pinned">상단 고정</label>
                    </div>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">내용 <span class="text-danger">*</span></label>
                <textarea name="body" class="form-control" rows="10" required
                          placeholder="공지 내용을 입력하세요.">{{ notice.body if notice else '' }}</textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> {{ '수정' if notice else '등록' }}
                </button>
                {% if notice %}
                <a href="{{ url_for('notice_view', nid=notice.id) }}" class="btn btn-outline-secondary">취소</a>
                {% else %}
                <a href="{{ url_for('notice_list') }}" class="btn btn-outline-secondary">취소</a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
